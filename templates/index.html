<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dhurva AI Translator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    transition: background 1s ease;
    color: white;
}

.container {
    width: 600px;
    margin: 60px auto;
    background: rgba(0,0,0,0.65);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

select {
    width: 48%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    color: white;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
}

.output {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
}

.speak-btn {
    background: linear-gradient(45deg, #36d1dc, #5b86e5);
}
</style>
</head>

<body>

<div class="container">
    <h2>🌍 AI Translator</h2>

    <form action="/translate" method="post">
        <textarea name="text" placeholder="Enter text...">{{ original_text if original_text else '' }}</textarea>

        <div class="row">
            <select name="source">
                {% for code, name in languages.items() %}
                    <option value="{{code}}" {% if code == src_lang %}selected{% endif %}>{{name}}</option>
                {% endfor %}
            </select>

            <select name="target">
                {% for code, name in languages.items() %}
                    <option value="{{code}}" {% if code == dest_lang %}selected{% endif %}>{{name}}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Translate</button>
    </form>

    {% if translated_text %}
    <div class="output">
        <p id="translatedText" data-lang="{{dest_lang}}">
            {{ translated_text }}
        </p>

        <button class="speak-btn" onclick="speakText()">🔊 Speak</button>
    </div>
    {% endif %}
</div>

<script>
function speakText() {
    let text = document.getElementById("translatedText").innerText;
    let lang = document.getElementById("translatedText").getAttribute("data-lang");

    fetch("/speak", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `text=${encodeURIComponent(text)}&lang=${lang}`
    })
    .then(res => res.blob())
    .then(blob => {
        let audio = new Audio(URL.createObjectURL(blob));
        audio.play();
    });
}

// background animation
const gradients = [
    "linear-gradient(135deg, #1f1c2c, #928dab)",
    "linear-gradient(135deg, #ff416c, #ff4b2b)",
    "linear-gradient(135deg, #36d1dc, #5b86e5)"
];

let i = 0;
setInterval(() => {
    document.body.style.background = gradients[i];
    i = (i + 1) % gradients.length;
}, 10000);
</script>

</body>
</html>
